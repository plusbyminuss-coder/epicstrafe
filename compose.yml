services:
  mysql:
    image: mysql:8.4
    container_name: epicstrafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: epicstrafe_root_dev
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - epicstrafe-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pepicstrafe_root_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  epicstrafe-mysql-data:
